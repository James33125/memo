<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プレミアム・パーソナルダイアリー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-8">

<div class="container max-w-5xl w-full grid grid-cols-1 md:grid-cols-12 gap-6">
    
    <div class="md:col-span-5 bg-white rounded-2xl shadow-xl shadow-slate-100 p-6 border border-slate-100 flex flex-col justify-between">
        <div>
            <div class="flex justify-between items-center mb-6">
                <button id="prev-month" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600 transition-all">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 id="calendar-title" class="text-xl font-bold text-slate-800 tracking-wide">2026年 5月</h2>
                <button id="next-month" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600 transition-all">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            
            <div class="calendar-grid grid grid-cols-7 gap-2 text-center" id="calendar-grid">
                </div>
        </div>

        <div class="mt-8 pt-4 border-t border-slate-100 flex gap-2">
            <button id="export-btn" class="flex-1 text-xs py-2 px-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-all flex items-center justify-center gap-1">
                <i class="fa-solid fa-download"></i> バックアップ取得
            </button>
            <button id="clear-all-btn" class="text-xs py-2 px-3 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg transition-all flex items-center justify-center gap-1">
                <i class="fa-solid fa-trash-can"></i> 全削除
            </button>
        </div>
    </div>

    <div class="md:col-span-7 bg-white rounded-2xl shadow-xl shadow-slate-100 p-6 border border-slate-100 flex flex-col gap-6">
        <div class="flex items-center gap-3 pb-4 border-b border-slate-100">
            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-xl font-bold">
                <i class="fa-regular fa-calendar-check"></i>
            </div>
            <div>
                <div id="selected-date-label" class="text-xl font-extrabold text-slate-900">日付を選択してください</div>
                <p class="text-xs text-slate-400">個人の端末内（OS）に安全に暗号保護されています</p>
            </div>
        </div>
        
        <div class="space-y-2">
            <label class="block text-sm font-semibold text-slate-600 flex items-center gap-1">
                <i class="fa-solid fa-pen-nib text-indigo-500"></i> 新しいメモを追加
            </label>
            <textarea id="memo-input" class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white outline-none transition-all resize-none text-sm placeholder:text-slate-400" placeholder="今日の勉強内容や、残しておきたいログを入力...&#13;（Ctrl + Enterでも保存できます）"></textarea>
            <button id="save-btn" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium py-3 px-4 rounded-xl shadow-md shadow-indigo-100 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                <i class="fa-solid fa-circle-plus"></i> この日にメモ保存
            </button>
        </div>

        <div class="flex-1 flex flex-col min-h-[250px]">
            <h3 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-1">
                <i class="fa-solid fa-clock-rotate-left text-purple-500"></i> タイムライン履歴
            </h3>
            <div id="memo-output" class="flex-1 overflow-y-auto space-y-3 pr-1 max-h-[300px]">
                </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
